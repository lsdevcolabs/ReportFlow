kind = "web"
previewPath = "/"
title = "ReportFlow"
version = "1.0.0"
id = "artifacts/reportflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24567

[services.development]
run = "pnpm --filter @workspace/reportflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/reportflow", "run", "build" ]
publicDir = "artifacts/reportflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24567"
BASE_PATH = "/"
